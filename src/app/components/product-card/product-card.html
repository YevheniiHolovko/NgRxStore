<div class="card" [routerLink]="['/product', product.id]" style="cursor: pointer">
  <div class="image-box">
    <img [src]="product.image" [alt]="product.title" />
  </div>
  <div class="card-content">
    <h3 class="card-title">{{ product.title }}</h3>
    <div class="card-footer">
      <p class="price">{{ product.price }}</p>
      <button class="add-btn" (click)="onAddToCart($event)">Купити</button>
    </div>
  </div>
</div>
