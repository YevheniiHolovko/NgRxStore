<div *ngIf="product$ | async as product" class="product-detail">
  <button routerLink="/">← Назад до списку</button>
  <div class="content">
    <img [src]="product.image" [alt]="product.title">
    <h1>{{ product.title }}</h1>
    <p class="category">Категорія: {{ product.category }}</p>
    <p class="description">{{ product.description }}</p>
    <p class="price">Ціна: {{ product.price }} $</p>
    <button class="buy-btn">Додати в кошик</button>
  </div>
</div>
